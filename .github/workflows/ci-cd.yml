name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  SESSION_SECRET: "test-session-secret-for-ci-only"
  JWT_SECRET: "test-jwt-secret-for-ci-only"

jobs:
  # Security and Code Quality Checks
  security-scan:
    name: Security & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate || true

      - name: Check for hardcoded secrets
        run: |
          # Check for common hardcoded secrets patterns
          if grep -r "password.*123\|secret.*test\|token.*123" --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Check for security issues
        run: |
          # Check for console.log in production code
          if grep -r "console\.log\|console\.error\|console\.warn" server/ --exclude-dir=node_modules | grep -v "logger\|error\|debug"; then
            echo "⚠️  Console logging found in server code"
            # Don't fail CI for this, just warn
          fi

  # Test Suite
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      sqlite3:
        image: sqlite3:latest
        options: >-
          --health-cmd "sqlite3 --version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: |
          mkdir -p test-db
          sqlite3 test-db/test.db "CREATE TABLE test (id INTEGER PRIMARY KEY, data TEXT);"

      - name: Run health check validation
        run: |
          npm run setup-admin
          timeout 30s npm start &
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          curl -f http://localhost:3000/api/health || exit 1
          echo "✅ Health checks passed"

      - name: Run security validation
        run: |
          node scripts/security-test.js --local || exit 1
          echo "✅ Security validation passed"

  # Build and Deploy Validation
  build-deploy:
    name: Build & Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Validate build artifacts
        run: |
          # Check if build directory exists
          if [ ! -d "client/build" ]; then
            echo "❌ Client build failed - build directory not found"
            exit 1
          fi

          # Check for required build files
          if [ ! -f "client/build/index.html" ]; then
            echo "❌ index.html not found in build"
            exit 1
          fi

          # Check bundle size (should be reasonable)
          bundle_size=$(du -sh client/build/assets/ | cut -f1)
          echo "📦 Bundle size: $bundle_size"

          # Check if bundles are split properly
          bundle_count=$(ls client/build/assets/*.js | wc -l)
          if [ "$bundle_count" -lt 3 ]; then
            echo "⚠️  Only $bundle_count JS bundles found - code splitting may not be working"
          else
            echo "✅ Code splitting working: $bundle_count bundles"
          fi

      - name: Validate server build
        run: |
          # Syntax check
          node -c server/index.js || exit 1
          node -c server/modules/database.js || exit 1
          node -c server/modules/server.js || exit 1
          node -c server/modules/health.js || exit 1
          echo "✅ Server syntax validation passed"

      - name: Check deployment readiness
        run: |
          # Check for required environment variables in config
          if grep -q "requireEnvVar('SESSION_SECRET')" server/config.js; then
            echo "✅ Environment variable validation present"
          else
            echo "❌ Missing environment variable validation"
            exit 1
          fi

          # Check for admin setup script
          if [ -f "scripts/setup-admin.js" ]; then
            echo "✅ Admin setup script present"
          else
            echo "❌ Admin setup script missing"
            exit 1
          fi

          # Check for Dockerfile
          if [ -f "Dockerfile" ]; then
            echo "✅ Dockerfile present"
          else
            echo "❌ Dockerfile missing"
            exit 1
          fi

  # Health Check Validation
  health-checks:
    name: Health Check Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          # Create test database
          mkdir -p test-data
          export DATABASE_URL="test-data/test.db"
          export SESSION_SECRET="test-session-secret"
          export JWT_SECRET="test-jwt-secret"
          export NODE_ENV="test"

          # Initialize database
          npm run setup-admin

      - name: Test health endpoints
        run: |
          export DATABASE_URL="test-data/test.db"
          export SESSION_SECRET="test-session-secret"
          export JWT_SECRET="test-jwt-secret"
          export NODE_ENV="test"

          # Start server in background
          timeout 30s npm start &
          SERVER_PID=$!

          # Wait for server to start
          sleep 5

          # Test basic health endpoint
          if curl -s -f http://localhost:3000/health > /dev/null 2>&1; then
            echo "✅ Basic health endpoint responding"
          else
            echo "❌ Basic health endpoint not responding"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Test detailed health endpoint
          if curl -s -f http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "✅ API health endpoint responding"
          else
            echo "❌ API health endpoint not responding"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Test health response content
          health_response=$(curl -s http://localhost:3000/api/health)
          if echo "$health_response" | grep -q '"status":"healthy"'; then
            echo "✅ Health response indicates healthy status"
          else
            echo "❌ Health response does not indicate healthy status"
            echo "Response: $health_response"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

  # Docker Build Validation
  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: colabora:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Run the container briefly to check if it starts
          docker run -d --name colabora-test -p 3000:3000 colabora:test
          sleep 10

          # Check if container is running
          if docker ps | grep -q colabora-test; then
            echo "✅ Docker container started successfully"
          else
            echo "❌ Docker container failed to start"
            docker logs colabora-test
            exit 1
          fi

          # Test health endpoint in container
          if curl -f http://localhost:3000/health; then
            echo "✅ Docker health check passed"
          else
            echo "❌ Docker health check failed"
            docker logs colabora-test
            exit 1
          fi

          # Cleanup
          docker stop colabora-test
          docker rm colabora-test

  # Deployment Readiness Check
  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deployment validation
        run: |
          # Check package.json for required scripts
          if npm run | grep -q "setup-admin"; then
            echo "✅ setup-admin script available"
          else
            echo "❌ setup-admin script missing"
            exit 1
          fi

          # Check for required files
          required_files=("README.md" "ADMIN_SETUP.md" "Dockerfile" ".env.example")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

          # Check environment variable documentation
          if grep -q "SESSION_SECRET" ADMIN_SETUP.md && grep -q "JWT_SECRET" ADMIN_SETUP.md; then
            echo "✅ Environment variables documented"
          else
            echo "❌ Environment variables not documented"
            exit 1
          fi

          # Check for security headers in config
          if grep -q "helmet" server/config.js; then
            echo "✅ Security headers configured"
          else
            echo "❌ Security headers not configured"
            exit 1
          fi

          echo "🎉 Deployment readiness check passed!"

  # Production Deployment (only on main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [security-scan, test, build-deploy, health-checks, docker-validation, deployment-readiness]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != ''
        run: |
          # Install Fly CLI
          curl -L https://fly.io/install.sh | sh
          export FLYCTL_INSTALL="/home/runner/.fly"
          export PATH="$FLYCTL_INSTALL/bin:$PATH"

          # Deploy to Fly.io
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: |
          # Railway deployment would go here
          echo "Railway deployment not configured yet"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify deployment success
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "Health checks: https://your-domain.com/health"
          echo "Admin setup: Run 'npm run setup-admin' after deployment"
