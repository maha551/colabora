# Staging configuration for colabora-app-staging
# Deploys from the develop branch via CI/CD
# See https://fly.io/docs/reference/configuration/ for reference

app = 'colabora-app-staging'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
