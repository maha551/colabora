name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  SESSION_SECRET: "ba46743911c556ee3c5d49a72a7fb2286b5239ed93e0480bb23e34dd76a417fa"
  JWT_SECRET: "16a24a08c38c82a65890c55884518646f409ecea29f8a9adc00adbedbbe68ebe"

jobs:
  # Code Quality and Dependencies
  code-quality:
    name: Code Quality & Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || echo "Linting not configured"

      - name: Run security audit
        run: npm audit --audit-level moderate || echo "Audit completed with warnings"

      - name: Check syntax
        run: |
          # Check server syntax
          node -c server/index.js || exit 1
          node -c server/config.js || exit 1
          node -c server/modules/database.js || exit 1
          node -c server/modules/server.js || exit 1
          node -c server/modules/health.js || exit 1

          echo "✅ Syntax validation passed"

  # Build and Validation
  build-validation:
    name: Build & Validation
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Validate build artifacts
        run: |
          # Check if build directory exists
          if [ ! -d "client/build" ]; then
            echo "❌ Client build failed - build directory not found"
            exit 1
          fi

          # Check for required build files
          if [ ! -f "client/build/index.html" ]; then
            echo "❌ index.html not found in build"
            exit 1
          fi

          echo "✅ Build validation passed"

      - name: Run deployment readiness check
        run: |
          # Create a simple .env file for testing
          echo "SESSION_SECRET=$SESSION_SECRET" > .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000" >> .env

          # Run deployment check
          npm run deployment-check || exit 1

          echo "✅ Deployment readiness check passed"

      - name: Run security validation
        run: |
          node scripts/security-test.js --local || echo "Security check completed with warnings"

  # Docker Build Validation
  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build-validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: colabora:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Run the container briefly to check if it starts
          docker run -d --name colabora-test -p 3000:3000 colabora:test
          sleep 10

          # Check if container is running
          if docker ps | grep -q colabora-test; then
            echo "✅ Docker container started successfully"
          else
            echo "❌ Docker container failed to start"
            docker logs colabora-test
            exit 1
          fi

          # Test health endpoint in container
          if curl -f http://localhost:3000/health; then
            echo "✅ Docker health check passed"
          else
            echo "❌ Docker health check failed"
            docker logs colabora-test
            exit 1
          fi

          # Cleanup
          docker stop colabora-test
          docker rm colabora-test

  # Health Check Validation
  health-checks:
    name: Health Check Validation
    runs-on: ubuntu-latest
    needs: build-validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          # Create test database directory
          mkdir -p test-data

      - name: Test health endpoints
        run: |
          # Create .env file
          echo "SESSION_SECRET=$SESSION_SECRET" > .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "NODE_ENV=test" >> .env
          echo "DATABASE_URL=test-data/test.db" >> .env
          echo "PORT=3000" >> .env

          # Start server in background
          timeout 30s npm start &
          SERVER_PID=$!

          # Wait for server to start
          sleep 8

          # Test basic health endpoint
          if curl -s -f http://localhost:3000/health > /dev/null 2>&1; then
            echo "✅ Basic health endpoint responding"
          else
            echo "❌ Basic health endpoint not responding"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Test detailed health endpoint
          if curl -s -f http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "✅ API health endpoint responding"
          else
            echo "❌ API health endpoint not responding"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

          echo "✅ Health check validation passed"

  # Deployment Readiness Check
  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [build-validation, docker-validation, health-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Final deployment validation
        run: |
          # Check for required files
          required_files=("README.md" "ADMIN_SETUP.md" "Dockerfile" ".env.example")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

          # Check environment variable documentation
          if grep -q "SESSION_SECRET" ADMIN_SETUP.md && grep -q "JWT_SECRET" ADMIN_SETUP.md; then
            echo "✅ Environment variables documented"
          else
            echo "❌ Environment variables not documented"
            exit 1
          fi

          echo "🎉 All deployment checks passed!"

  # Production Deployment (only on main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [code-quality, build-validation, docker-validation, health-checks, deployment-readiness]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 All checks passed! Ready for production deployment."
          echo "Manual deployment steps:"
          echo "1. Set environment variables in your deployment platform"
          echo "2. Run 'npm run setup-admin' after deployment"
          echo "3. Access admin at /api/admin/dashboard"
