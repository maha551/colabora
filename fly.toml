# Minimal fly.toml for Fly.io deployment
app = "colabora-fresh"

[env]
  NODE_ENV = "production"

primary_region = "iad"

# Persistent volume for database (1GB in US East)
[mounts]
  source = "colabora_data"
  destination = "/data"
  initial_size = "1GB"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[processes]
  app = "npm start"

[[services]]
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "180s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    restart_limit = 10
    tls_skip_verify = false

  # Simple health check that doesn't require database
  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
    restart_limit = 5
