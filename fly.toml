# Minimal fly.toml for fresh EU deployment
app = "colabora-fresh"

[env]
  NODE_ENV = "production"
  DATABASE_URL = "/data/colabora.db"

primary_region = "fra"

# Persistent volume for database (1GB in EU)
[mounts]
  source = "colabora_data"
  destination = "/data"
  initial_size = "1GB"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[processes]
  app = "npm start"

[[services]]
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "120s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    restart_limit = 10
