# Postgres + Redis on a dedicated Hetzner data server (private network).
# NOT run on Kamal app servers — use a separate CPX/CCX instance (e.g. 10.0.0.20).
#
# Setup:
#   1. Create server in same Hetzner Cloud project + private network
#   2. Copy this file and .env.data.example → .env.data on the server
#   3. docker compose -f docker-compose.data.yml --env-file .env.data up -d
#   4. Firewall: allow 5432 and 6379 only from app server private IPs
#
# Backups: schedule pg_dump (see docs/active/HETZNER_DEPLOYMENT.md)

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-colabora}
      POSTGRES_USER: ${POSTGRES_USER:-colabora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.data}
    command:
      - postgres
      - -c
      - max_connections=150
      - -c
      - shared_buffers=1GB
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-colabora-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      # Bind to private IP only in production (replace 0.0.0.0 with e.g. 10.0.0.20)
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colabora} -d ${POSTGRES_DB:-colabora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.data}
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
