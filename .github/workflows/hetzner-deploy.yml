# Deploy Colabora to Hetzner via Kamal (manual trigger).
# Production: single app server (app-1) + data-1 — see config/deploy.yml
#
# Required GitHub secrets: same as .kamal/secrets.example

name: Hetzner Deploy

on:
  workflow_dispatch:
    inputs:
      destination:
        description: Kamal destination
        required: true
        default: production
        type: choice
        options:
          - production
          - pilot
          - staging

permissions:
  contents: read
  packages: write

concurrency:
  group: hetzner-deploy-${{ github.event.inputs.destination }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner (Kamal)
    runs-on: ubuntu-latest
    if: github.repository == 'maha551/colabora'
    environment: production
    env:
      CI: true
      KAMAL_DESTINATION: ${{ github.event.inputs.destination }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Kamal
        run: gem install kamal --no-document

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD || github.token }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}

      - name: Configure deploy SSH key for Kamal
        env:
          KAMAL_SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$KAMAL_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/colabora_deploy
          chmod 600 ~/.ssh/colabora_deploy
          if ! ssh-keygen -y -f ~/.ssh/colabora_deploy >/dev/null 2>&1; then
            echo "::error::KAMAL_SSH_PRIVATE_KEY is missing or not a valid private key."
            exit 1
          fi
          echo "Deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/colabora_deploy
          ssh-add ~/.ssh/colabora_deploy
          echo "SSH agent keys:"
          ssh-add -l

      - name: Add app servers to known_hosts
        run: |
          # Do NOT use ssh-keyscan -H: Kamal/SSHKit cannot verify hashed known_hosts
          # entries reliably (see basecamp/kamal#1814) and raises HostKeyMismatch.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          DEST="${KAMAL_DESTINATION}"
          if [ "$DEST" = "pilot" ]; then
            CONFIG="config/deploy.pilot.yml"
          elif [ "$DEST" = "staging" ]; then
            CONFIG="config/deploy.staging.yml"
          else
            CONFIG="config/deploy.yml"
          fi
          echo "Using host list from $CONFIG (destination: $DEST)"
          for ip in $(grep -E '^\s+-\s+[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$CONFIG" | awk '{print $2}'); do
            echo "Adding $ip (unhashed host keys for Kamal/net-ssh)"
            ssh-keyscan -T 10 -t ed25519,ecdsa,rsa "$ip" >> ~/.ssh/known_hosts 2>/dev/null || true
          done
          chmod 600 ~/.ssh/known_hosts
          echo "Known hosts entries:"
          cat ~/.ssh/known_hosts

      - name: Verify SSH to app servers
        run: |
          DEST="${KAMAL_DESTINATION}"
          if [ "$DEST" = "pilot" ]; then
            CONFIG="config/deploy.pilot.yml"
          elif [ "$DEST" = "staging" ]; then
            CONFIG="config/deploy.staging.yml"
          else
            CONFIG="config/deploy.yml"
          fi
          # deploy.yml contains ERB; extract host IPs without loading it as plain YAML.
          for ip in $(grep -E '^\s+-\s+[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$CONFIG" | awk '{print $2}'); do
            echo "Testing deploy@${ip}..."
            ssh -i ~/.ssh/colabora_deploy -o BatchMode=yes -o IdentitiesOnly=yes \
              deploy@"$ip" "echo OK deploy@${ip}"
          done

      - name: Show Kamal SSH config
        run: kamal config | ruby -ryaml -e "c=YAML.load(STDIN.read); puts c.dig('ssh').to_yaml"

      - name: Write Kamal secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD || github.token }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SITE_OPERATOR_NAME: ${{ secrets.SITE_OPERATOR_NAME }}
          SITE_OPERATOR_ADDRESS: ${{ secrets.SITE_OPERATOR_ADDRESS }}
        run: |
          mkdir -p .kamal
          if [ "${KAMAL_DESTINATION}" = "production" ]; then
            SECRETS_FILE=".kamal/secrets"
          else
            SECRETS_FILE=".kamal/secrets.${KAMAL_DESTINATION}"
          fi
          cat > "$SECRETS_FILE" <<EOF
          KAMAL_REGISTRY_PASSWORD=${KAMAL_REGISTRY_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          JWT_SECRET=${JWT_SECRET}
          FRONTEND_URL=${FRONTEND_URL}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          RESEND_API_KEY=${RESEND_API_KEY}
          RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
          CONTACT_EMAIL=${CONTACT_EMAIL}
          SITE_OPERATOR_NAME=${SITE_OPERATOR_NAME}
          SITE_OPERATOR_ADDRESS=${SITE_OPERATOR_ADDRESS}
          EOF

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD || github.token }}
        run: |
          if [ "${KAMAL_DESTINATION}" = "production" ]; then
            kamal deploy -v
          else
            kamal deploy -d "${KAMAL_DESTINATION}" -v
          fi

      - name: Post-deploy reminder
        run: |
          echo "Deployed destination: ${KAMAL_DESTINATION}"
          echo "Fresh install: kamal app exec -d ${KAMAL_DESTINATION} -i 'node scripts/setup-admin.js'"
