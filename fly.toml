app = "colabora"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # Change this to a secure random secret before deploying!
  SESSION_SECRET = "colabora-secure-session-secret-change-this-in-production"

[mounts]
  source = "colabora_data"
  destination = "/data"
  initial_size = "1GB"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[processes]
  app = "npm start"

# Remove complex checks that might cause issues
# [[services.http_checks]]
#   interval = "10s"
#   timeout = "5s"
#   path = "/health"

[[services]]
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    path = "/health"

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
