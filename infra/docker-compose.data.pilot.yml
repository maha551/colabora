# Pilot data layer — Postgres + Redis tuned for CX33 (8 GB) on a small group test.
# Use instead of docker-compose.data.yml when data-1 is CX33 (recommended pilot size).
#
#   docker compose -f docker-compose.data.pilot.yml --env-file .env.data up -d

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-colabora}
      POSTGRES_USER: ${POSTGRES_USER:-colabora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.data}
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=512MB
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-colabora-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colabora} -d ${POSTGRES_DB:-colabora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.data}
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
