app = "colabora"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

# Deploy to Germany regions (allow fallback if Frankfurt is full)
primary_region = "fra"

# Secure secrets (generate random values for production)
[secrets]
  SESSION_SECRET = "your-generated-session-secret-here"
  JWT_SECRET = "your-generated-jwt-secret-here"

# Temporarily disabled volume for initial deployment
# [mounts]
#   source = "colabora_data"
#   destination = "/data"
#   initial_size = "1GB"
#   auto_extend_size_threshold = 80
#   auto_extend_size_increment = "1GB"
#   auto_extend_size_limit = "10GB"

#   # Ensure volume is in Frankfurt, Germany
#   [mounts.regions]
#     fra = { priority = 1 }

# Deployment configuration
[deploy]
  strategy = "rolling"
  max_unavailable = 0.5
  release_command = ""

# Instance configuration
[experimental]
  auto_rollback = true

[processes]
  app = "npm start"

[[services]]
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    restart_limit = 10

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
