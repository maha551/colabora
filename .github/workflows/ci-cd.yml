name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
# - JWT_SECRET: 32+ character cryptographically random string
env:
  NODE_VERSION: "20"
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      deploy_heavy: ${{ steps.filter.outputs.deploy_heavy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter deploy-relevant paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy_heavy:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'server/**'
              - 'knex/**'
              - 'config/deploy*.yml'
              - 'scripts/deployment-check.js'
              - 'scripts/security-test.js'
              - '.github/workflows/ci-cd.yml'
              - '.github/workflows/hetzner-deploy.yml'

  # Code Quality and Dependencies
  code-quality:
    name: Code Quality & Dependencies
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Client type-check (report-only)
        continue-on-error: true
        run: |
          cd client && npm ci && npm run type-check 2>&1 | tee type-check-report.txt || true
          echo "Type-check completed (non-blocking while type debt is reduced)"

      - name: Client ESLint (report-only)
        continue-on-error: true
        run: |
          cd client && npm run lint 2>&1 | tee eslint-report.txt || true
          echo "ESLint completed (non-blocking while lint debt is reduced)"

      - name: Run security audit
        run: npm audit --audit-level=moderate --omit=dev

      - name: Check syntax
        run: |
          # Check server syntax
          node -c server/index.js || exit 1
          node -c server/config.js || exit 1
          node -c server/database/DatabaseManager.js || exit 1
          node -c server/modules/server.js || exit 1
          node -c server/modules/health.js || exit 1

          echo "✅ Syntax validation passed"

  # Test (unit + integration)
  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: colabora_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d colabora_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/colabora_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/colabora_ci
      NODE_ENV: test
      PG_POOL_MAX: "5"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run install:frontend

      - name: Verify PostgreSQL is reachable
        run: node scripts/setup-test-db.js

      - name: Run tests with coverage
        run: npm run test:ci

  client-unit:
    name: Client unit tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run install:frontend

      - name: Run client unit tests
        run: npm run test:client-unit

  # Build and Validation
  build-validation:
    name: Build & Validation
    runs-on: ubuntu-latest
    needs: [code-quality, test, client-unit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run install:frontend

      - name: Build client
        run: cd client && npm run build

      - name: Validate build artifacts
        run: |
          # Check if build directory exists
          if [ ! -d "client/build" ]; then
            echo "❌ Client build failed - build directory not found"
            exit 1
          fi

          # Check for required build files
          if [ ! -f "client/build/index.html" ]; then
            echo "❌ index.html not found in build"
            exit 1
          fi

          if [ ! -f "client/build/legal/en/privacy.md" ]; then
            echo "❌ client/build/legal/en/privacy.md missing"
            exit 1
          fi

          if [ ! -f "client/build/locales/en/emails.json" ]; then
            echo "❌ client/build/locales/en/emails.json missing"
            exit 1
          fi

          if [ ! -f "client/build/logo-light.png" ]; then
            echo "❌ client/build/logo-light.png missing"
            exit 1
          fi

          echo "✅ Build validation passed"

      - name: Run deployment readiness check
        run: |
          # Create a simple .env file for testing
          echo "JWT_SECRET=$JWT_SECRET" > .env
          echo "NODE_ENV=test" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/colabora_ci" >> .env
          echo "PORT=3000" >> .env

          # Run deployment check
          npm run deployment-check

          echo "✅ Deployment readiness check passed"

      - name: Run security validation
        run: |
          node scripts/security-test.js --local

  # Docker Build Validation
  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [changes, build-validation]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.deploy_heavy == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: colabora_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d colabora_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: colabora:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Run the container briefly to check if it starts
          docker run -d --name colabora-test --add-host=host.docker.internal:host-gateway -p 3000:3000 \
            -e NODE_ENV=test \
            -e JWT_SECRET="$JWT_SECRET" \
            -e DATABASE_URL="postgresql://postgres:postgres@host.docker.internal:5432/colabora_ci" \
            colabora:test
          sleep 30

          # Check if container is running
          if docker ps | grep -q colabora-test; then
            echo "✅ Docker container started successfully"
          else
            echo "❌ Docker container failed to start"
            docker logs colabora-test
            exit 1
          fi

          # Test liveness endpoint
          if curl -s -f http://localhost:3000/api/health/live > /dev/null; then
            echo "✅ Docker liveness check passed"
          else
            echo "❌ Docker liveness check failed"
            docker logs colabora-test
            exit 1
          fi

          # Test readiness endpoint
          if curl -s -f http://localhost:3000/api/health/ready > /dev/null; then
            echo "✅ Docker readiness check passed"
          else
            echo "❌ Docker readiness check failed"
            docker logs colabora-test
            exit 1
          fi

          # Cleanup
          docker stop colabora-test
          docker rm colabora-test

  # Health Check Validation
  health-checks:
    name: Health Check Validation
    runs-on: ubuntu-latest
    needs: [changes, build-validation]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.deploy_heavy == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: colabora_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d colabora_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          mkdir -p test-data
          echo "JWT_SECRET=$JWT_SECRET" > .env
          echo "NODE_ENV=test" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/colabora_ci" >> .env
          echo "PORT=3000" >> .env
          npm run db:migrate

      - name: Test health endpoints
        run: |
          timeout 60s npm start &
          SERVER_PID=$!

          ready=0
          for i in $(seq 1 30); do
            if curl -s -f http://localhost:3000/api/health/live > /dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "❌ Liveness endpoint not responding"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          echo "✅ Liveness endpoint responding"

          ready=0
          for i in $(seq 1 30); do
            if curl -s -f http://localhost:3000/api/health/ready > /dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "❌ Readiness endpoint not responding"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          echo "✅ Readiness endpoint responding"

          kill $SERVER_PID 2>/dev/null || true
          echo "✅ Health check validation passed"

  # Deployment Readiness Check
  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [changes, build-validation, docker-validation, health-checks]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.deploy_heavy == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Final deployment validation
        run: |
          # Check for required files
          required_files=("README.md" "ADMIN_SETUP.md" "Dockerfile" ".env.example" "config/deploy.yml" "docs/active/HETZNER_DEPLOYMENT.md")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

          # Check environment variable documentation
          if grep -q "JWT_SECRET" docs/active/ADMIN_SETUP.md; then
            echo "✅ Environment variables documented"
          else
            echo "❌ JWT_SECRET not documented in docs/active/ADMIN_SETUP.md"
            exit 1
          fi

          echo "🎉 All deployment checks passed!"

  # Production deploy runs in .github/workflows/hetzner-deploy.yml after this workflow succeeds.
  deploy-ready:
    name: Ready for Hetzner Deploy
    runs-on: ubuntu-latest
    needs:
      [
        code-quality,
        build-validation,
        docker-validation,
        health-checks,
        deployment-readiness,
      ]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.docker-validation.result == 'success' &&
      needs.health-checks.result == 'success' &&
      needs.deployment-readiness.result == 'success'
    steps:
      - name: CI passed — Hetzner Deploy workflow will run next
        run: |
          echo "✅ All checks passed."
          echo "Hetzner Deploy (.github/workflows/hetzner-deploy.yml) runs automatically on workflow_run."
          echo "Or trigger manually: Actions → Hetzner Deploy → Run workflow"
          echo "Docs: docs/active/HETZNER_DEPLOYMENT.md"
