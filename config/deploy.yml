# Kamal 2 — production (app-1 + data-1)
# Docs: docs/active/HETZNER_DEPLOYMENT.md
#
# Architecture:
#   Users → app-1 (162.55.164.223) — Kamal proxy + app container
#              │ private network
#              ▼
#           data-1 (10.0.0.3) — Postgres + Redis
#
# DNS: colabora.local-correspondent.com → app-1 public IP
#
# Deploy:
#   cp .kamal/secrets.example .kamal/secrets
#   kamal setup && kamal deploy

service: colabora
image: maha551/colabora

ssh:
  user: deploy
<% if ENV["CI"] == "true" %>
  # Kamal/net-ssh does not reliably use ssh-agent in GitHub Actions; point at the
  # key file written in hetzner-deploy.yml (avoids password fallback / ENOTTY).
  keys:
    - <%= File.expand_path("~/.ssh/kamal_ci_key") %>
  keys_only: true
<% end %>

servers:
  web:
    hosts:
      - 162.55.164.223 # app-1 public IP

proxy:
  ssl: true
  host: colabora.local-correspondent.com
  app_port: 3000
  healthcheck:
    path: /api/health/ready

registry:
  server: ghcr.io
  username: maha551
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    NODE_ENV: production
    PORT: "3000"
    LOG_LEVEL: info
    JWT_EXPIRES_IN: 24h
    PG_POOL_MIN: "2"
    PG_POOL_MAX: "25"
    PG_POOL_ACQUIRE_TIMEOUT: "30000"
    PG_KEEPALIVE_ENABLED: "true"
    PG_SOCKET_TIMEOUT: "120000"
    RATE_LIMIT_WINDOW_MS: "900000"
    RATE_LIMIT_MAX_REQUESTS: "1000"
    VIDEO_PROVIDER: none
    RESEND_FROM_NAME: "Colabora"
    TERMS_VERSION: "2026-06-11"
    PRIVACY_VERSION: "2026-06-11"
  secret:
    - DATABASE_URL
    - REDIS_URL
    - JWT_SECRET
    - FRONTEND_URL
    - ALLOWED_ORIGINS
    - RESEND_API_KEY
    - RESEND_FROM_EMAIL
    - CONTACT_EMAIL
    - SITE_OPERATOR_NAME
    - SITE_OPERATOR_ADDRESS

builder:
  arch: amd64
  context: .
  args:
    GIT_SHA: <%= `git rev-parse --short HEAD`.strip %>
    BUILD_TIME: <%= Time.now.utc.strftime('%Y-%m-%dT%H:%M:%SZ') %>

# Migrations run in container start script (Dockerfile /start.sh).
