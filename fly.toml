app = 'colabora-fresh-final'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_ORIGINS = 'https://colabora-fresh-final.fly.dev'
  FRONTEND_URL = 'https://colabora-fresh-final.fly.dev'
  JWT_SECRET = 'colabora-jwt-secret-key-2024-production'
  JWT_EXPIRES_IN = '8h'
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'
  RATE_LIMIT_MAX_REQUESTS = '500'
  RATE_LIMIT_WINDOW_MS = '900000'

[[mounts]]
  source = 'colabora_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/api/health/ready'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1