# fly.toml app configuration file for Colabora
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'colabora-fresh'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# Environment variables for production
[env]
  NODE_ENV = "production"
  PORT = "3000"
  FRONTEND_URL = "https://colabora-fresh.fly.dev"
  ALLOWED_ORIGINS = "https://colabora-fresh.fly.dev"
  LOG_LEVEL = "info"
  JWT_EXPIRES_IN = "24h"
  RATE_LIMIT_WINDOW_MS = "900000"
  RATE_LIMIT_MAX_REQUESTS = "100"

# Mount persistent volume for SQLite database
[mounts]
  source = "colabora_data"
  destination = "/data"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

# Health checks
[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/api/health/ready"
